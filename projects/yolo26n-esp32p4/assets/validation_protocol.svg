<text x="573" y="104" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">786K vals, 0 err</text>

<line x1="130" y1="94" x2="146" y2="94" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="488" y1="94" x2="504" y2="94" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TEST 1 (highlighted - core claim) -->
<rect x="40" y="140" width="90" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="85" y="162" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">TEST 1</text>

<rect x="148" y="140" width="340" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="318" y="154" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">LUT simulation accuracy</text>
<text x="318" y="172" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">HW(LUT model) vs Python(esp_ppq_lut)</text>

<rect x="506" y="140" width="134" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="573" y="154" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">PASS</text>
<text x="573" y="172" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">452K vals, 0 err</text>

<line x1="130" y1="162" x2="146" y2="162" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="488" y1="162" x2="504" y2="162" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Core claim annotation -->
<text x="573" y="200" text-anchor="middle" font-size="12" font-weight="500" fill="#534AB7">100% bit-exact</text>

<!-- TEST 2 -->
<rect x="40" y="220" width="90" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="85" y="242" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">TEST 2</text>

<rect x="148" y="220" width="340" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="318" y="234" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Simulation gap (control)</text>
<text x="318" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">HW(LUT model) vs float Swish</text>

<rect x="506" y="220" width="134" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="573" y="234" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">399K diff</text>
<text x="573" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">88.4% mismatch</text>

<line x1="130" y1="242" x2="146" y2="242" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="488" y1="242" x2="504" y2="242" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>


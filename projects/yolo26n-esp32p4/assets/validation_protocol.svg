<text x="318" y="86" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Preprocessing parity</text>
<text x="318" y="104" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">HW preprocess vs Python preprocess</text>

<rect x="506" y="72" width="134" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>

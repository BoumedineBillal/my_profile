<svg width="680" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Title -->
<text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">4-test firmware validation protocol (ESP32-P4)</text>
<text x="340" y="48" text-anchor="middle" font-size="12" fill="#5F5E5A">Two .espdl models from the same calibrated graph isolate the LUT as the only variable</text>

<!-- TEST 0 -->
<rect x="40" y="72" width="90" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="85" y="94" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">TEST 0</text>


<text x="318" y="304" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Baseline sanity check</text>
<text x="318" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">HW(IDEAL model) vs float Swish</text>

<rect x="506" y="290" width="134" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="573" y="304" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">PASS</text>
<text x="573" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">±5 tolerance</text>

<line x1="130" y1="312" x2="146" y2="312" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="488" y1="312" x2="504" y2="312" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Model explanation boxes -->
<rect x="40" y="365" width="295" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="187" y="380" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Model A (LUT)</text>
<text x="187" y="398" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Swish → 4KB LUT table (fast path)</text>

<rect x="345" y="365" width="295" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="492" y="380" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Model B (IDEAL)</text>
<text x="492" y="398" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">Standard Swish op (reference path)</text>

<!-- Bottom notes -->
<text x="40" y="438" font-size="12" fill="#5F5E5A">TEST 1 is the central claim: Python esp_ppq_lut produces identical output to ESP32-P4 hardware</text>
<text x="40" y="458" font-size="12" fill="#5F5E5A">TEST 2 proves the gap exists: without the library, 88.4% of predicted values would be wrong</text>

<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Section 1: How INT16 LUT interpolation works -->
<text x="40" y="30" font-size="14" font-weight="500" fill="#2C2C2A">INT16 LUT with linear interpolation (step=32)</text>

<!-- Input range bar -->
<rect x="40" y="50" width="600" height="24" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="48" y="66" dominant-baseline="central" font-size="12" fill="#5F5E5A">-32768</text>
<text x="630" y="66" dominant-baseline="central" text-anchor="end" font-size="12" fill="#5F5E5A">+32767</text>
<text x="340" y="66" dominant-baseline="central" text-anchor="middle" font-size="12" fill="#5F5E5A">INT16 input range (65,536 values)</text>

<!-- Zoomed segment view -->
<text x="40" y="110" font-size="12" fill="#5F5E5A">Zoomed: one segment (32 values between two pivot points)</text>

<!-- Segment background -->
<rect x="80" y="120" width="520" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>

<!-- Interpolation line between pivots -->
<line x1="120" y1="165" x2="480" y2="140" stroke="#1D9E75" stroke-width="1.5"/>

<!-- Pivot points -->
<circle cx="120" cy="165" r="6" fill="#1D9E75" stroke="#085041" stroke-width="1"/>
<circle cx="480" cy="140" r="6" fill="#1D9E75" stroke="#085041" stroke-width="1"/>

<!-- Query point -->
<circle cx="300" cy="153" r="4" fill="#D85A30" stroke="#712B13" stroke-width="1"/>
<line x1="300" y1="157" x2="300" y2="186" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="3 2"/>

<!-- Labels for segment -->
<text x="120" y="210" text-anchor="middle" font-size="12" fill="#085041">pivot[idx]</text>
<text x="480" y="210" text-anchor="middle" font-size="12" fill="#085041">pivot[idx+1]</text>
<text x="300" y="210" text-anchor="middle" font-size="12" fill="#D85A30">query input</text>

<!-- Formula -->
<text x="340" y="240" text-anchor="middle" font-size="12" fill="#444441">output = pivot[idx] + trunc( remainder × (pivot[idx+1] - pivot[idx]) / step )</text>

<!-- Section 2: The fencepost bug -->
<text x="40" y="285" font-size="14" font-weight="500" fill="#2C2C2A">The fencepost bug (discovered in esp-ppq exporter)</text>

<!-- Correct version label -->
<text x="40" y="312" font-size="12" font-weight="500" fill="#085041">Correct: 2,049 pivots for 2,048 segments</text>

<!-- Correct fence visualization -->
<g transform="translate(40, 325)">
<line x1="0" y1="0" x2="0" y2="30" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="110" y1="0" x2="110" y2="30" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="220" y1="0" x2="220" y2="30" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="330" y1="0" x2="330" y2="30" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="440" y1="0" x2="440" y2="30" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="550" y1="0" x2="550" y2="30" stroke="#1D9E75" stroke-width="2.5"/>
<rect x="1" y="8" width="108" height="14" rx="2" fill="#1D9E75" opacity="0.15"/>
<rect x="111" y="8" width="108" height="14" rx="2" fill="#1D9E75" opacity="0.15"/>
<rect x="221" y="8" width="108" height="14" rx="2" fill="#1D9E75" opacity="0.15"/>
<rect x="331" y="8" width="108" height="14" rx="2" fill="#1D9E75" opacity="0.15"/>
<rect x="441" y="8" width="108" height="14" rx="2" fill="#1D9E75" opacity="0.15"/>
<text x="0" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">0</text>
<text x="110" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">1</text>
<text x="220" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">...</text>
<text x="330" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">...</text>
<text x="440" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">2047</text>
<text x="550" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">2048</text>
</g>
<!-- OK badge -->
<rect x="606" y="330" width="34" height="22" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="623" y="345" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#085041">ok</text>

<!-- Bug version label -->
<text x="40" y="400" font-size="12" font-weight="500" fill="#A32D2D">Bug: exporter generated only 2,048 pivots (missing guard point)</text>

<g transform="translate(40, 413)">
<line x1="0" y1="0" x2="0" y2="30" stroke="#E24B4A" stroke-width="2.5"/>
<line x1="110" y1="0" x2="110" y2="30" stroke="#E24B4A" stroke-width="2.5"/>
<line x1="220" y1="0" x2="220" y2="30" stroke="#E24B4A" stroke-width="2.5"/>
<line x1="330" y1="0" x2="330" y2="30" stroke="#E24B4A" stroke-width="2.5"/>
<line x1="440" y1="0" x2="440" y2="30" stroke="#E24B4A" stroke-width="2.5"/>
<rect x="1" y="8" width="108" height="14" rx="2" fill="#E24B4A" opacity="0.1"/>
<rect x="111" y="8" width="108" height="14" rx="2" fill="#E24B4A" opacity="0.1"/>
<rect x="221" y="8" width="108" height="14" rx="2" fill="#E24B4A" opacity="0.1"/>
<rect x="331" y="8" width="108" height="14" rx="2" fill="#E24B4A" opacity="0.1"/>
<!-- Broken last segment -->
<rect x="441" y="8" width="108" height="14" rx="2" fill="#E24B4A" opacity="0.2" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="495" y="19" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A32D2D">out-of-bounds</text>
<text x="0" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">0</text>
<text x="110" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">1</text>
<text x="220" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">...</text>
<text x="330" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">...</text>
<text x="440" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">2047</text>
<text x="550" y="50" text-anchor="middle" font-size="11" fill="#E24B4A">???</text>
</g>
<!-- Bug badge -->
<rect x="606" y="418" width="34" height="22" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="623" y="433" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#791F1F">bug</text>

<!-- Bottom notes -->
<text x="40" y="490" font-size="12" fill="#5F5E5A">Effect: MCU reads garbage memory for high positive inputs (output 1,060 instead of expected 32,177)</text>
<text x="40" y="510" font-size="12" fill="#5F5E5A">Fix: torch.arange(min, max + step, step) → generates 2,049 points (adopted by esp-ppq maintainers)</text>
</svg>
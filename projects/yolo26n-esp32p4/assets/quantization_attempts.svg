<svg width="680" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Row 1: Attempt 1 - Standard INT8 -->
<rect x="40" y="40" width="290" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="185" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#791F1F">1. Standard INT8 (all layers)</text>
<text x="185" y="76" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#A32D2D">~1.7s latency</text>

<rect x="370" y="40" width="270" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="505" y="58" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#A32D2D">mAP destroyed</text>
<text x="505" y="76" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#A32D2D">Box regression fails completely</text>
<line x1="330" y1="68" x2="368" y2="68" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Row 2: Attempt 2 - INT16 Conv + INT8 Swish -->
<rect x="40" y="120" width="290" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="185" y="138" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">2. INT16 Conv + INT8 Swish</text>
<text x="185" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">~1.8s latency</text>

<rect x="370" y="120" width="270" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="505" y="138" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Still low mAP</text>
<text x="505" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">INT8 Swish = precision bottleneck</text>
<line x1="330" y1="148" x2="368" y2="148" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Row 3: Attempt 3 - INT16 Swish naive -->
<rect x="40" y="200" width="290" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="185" y="218" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">3. INT16 Swish (naive fallback)</text>
<text x="185" y="236" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">~5s+ latency (+660ms/layer)</text>

<rect x="370" y="200" width="270" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="505" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Good mAP restored</text>
<text x="505" y="236" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">dequant → float32 → requant</text>
<line x1="330" y1="228" x2="368" y2="228" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Row 4: Attempt 4 - INT16 LUT (solution) -->
<rect x="40" y="280" width="290" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="185" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">4. INT16 LUT + interpolation</text>
<text x="185" y="316" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">2,062ms (+16% vs INT8)</text>

<rect x="370" y="280" width="270" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="505" y="298" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">0.365 mAP (validated)</text>
<text x="505" y="316" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">4KB table, HW-accelerated</text>
<line x1="330" y1="308" x2="368" y2="308" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Vertical progression arrows -->
<line x1="185" y1="96" x2="185" y2="118" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="185" y1="176" x2="185" y2="198" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="185" y1="256" x2="185" y2="278" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Legend at bottom -->
<text x="40" y="370" font-size="12" fill="#5F5E5A">Columns: quantization strategy (left) → observed result (right)</text>
<text x="40" y="390" font-size="12" fill="#5F5E5A">The INT16 LUT replaces each Swish with a compact 2,049-entry table (step=32) using HW linear interpolation</text>
</svg>